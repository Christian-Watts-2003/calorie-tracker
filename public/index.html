<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c8ef5;
      --accent-hover: #8aa4ff;
      --text: #e8eaf6;
      --text-muted: #7986cb;
      --green: #66bb6a;
      --orange: #ffa726;
      --red: #ef5350;
      --blue: #42a5f5;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex;
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 4px;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── Shared panel ── */
    .panel { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 16px; }
    .panel.hidden { display: none; }

    /* ── Input card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    form { display: flex; flex-direction: column; gap: 12px; }

    textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      min-height: 110px;
      padding: 12px;
      resize: vertical;
      width: 100%;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    button[type="submit"] {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .examples {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .examples span {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      display: inline-block;
      margin: 3px 3px 0 0;
      padding: 3px 10px;
      transition: border-color 0.2s, color 0.2s;
    }

    .examples span:hover { border-color: var(--accent); color: var(--accent); }

    #status {
      color: var(--text-muted);
      font-size: 0.85rem;
      min-height: 20px;
      text-align: center;
    }

    #status.error { color: var(--red); }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Macro totals card ── */
    .totals-card {
      background: linear-gradient(135deg, #1e2540, #1a2038);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px;
    }

    .totals-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .macro-cell {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }

    .macro-cell .val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .macro-cell .lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

    .cal .val { color: var(--orange); }
    .pro .val { color: var(--green); }
    .car .val { color: var(--blue); }
    .fat .val { color: var(--red); }

    /* ── Item cards (analyze result) ── */
    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .item-card.not-found { opacity: 0.6; border-style: dashed; }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .item-name { font-weight: 600; font-size: 0.95rem; text-transform: capitalize; }
    .item-grams { color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; padding-top: 2px; }
    .matched-name { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 10px; font-style: italic; }

    .item-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .item-macro { background: var(--surface2); border-radius: 6px; padding: 6px 4px; text-align: center; }
    .item-macro .v { font-size: 0.95rem; font-weight: 600; }
    .item-macro .l { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-top: 1px; }
    .not-found-msg { color: var(--text-muted); font-size: 0.85rem; font-style: italic; }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Meal history table ── */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .history-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .history-card th {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 10px 12px;
      text-align: left;
      text-transform: uppercase;
    }

    .history-card th:not(:first-child) { text-align: right; }

    .history-card td {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      vertical-align: middle;
    }

    .history-card td:not(:first-child) { text-align: right; color: var(--text-muted); }

    .history-card tr:hover td { background: var(--surface2); }

    .meal-time { color: var(--text-muted); font-size: 0.75rem; }
    .meal-desc { font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    .delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 3px 8px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .delete-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,83,80,0.08); }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 32px;
      text-align: center;
    }

    /* ── Daily running total ── */
    .day-total-bar {
      background: var(--surface2);
      border-radius: 6px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .day-total-bar-fill {
      background: var(--accent);
      border-radius: 6px;
      height: 100%;
      transition: width 0.4s ease;
    }

    .day-goal-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 6px;
      text-align: right;
    }

    /* ── Weekly bar chart ── */
    .week-chart {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .week-chart h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 140px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-val {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 14px;
    }

    .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 3px;
      transition: height 0.4s ease;
    }

    .bar.today { background: var(--accent); }
    .bar.past   { background: var(--surface2); border: 1px solid var(--border); }
    .bar.empty  { background: var(--surface2); opacity: 0.4; }

    .bar-day {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
    }

    .bar-day.today { color: var(--accent); font-weight: 700; }

    .week-macros {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .week-macro { text-align: center; }
    .week-macro .wv { font-size: 1.1rem; font-weight: 700; }
    .week-macro .wl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

    /* ── Body tab ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(108,142,245,0.06);
    }

    .upload-area input[type="file"] { display: none; }

    .upload-icon { font-size: 2rem; margin-bottom: 10px; }

    .upload-area p { color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; }

    .upload-area strong { color: var(--text); }

    .upload-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 14px;
      padding: 10px 22px;
      transition: background 0.2s;
    }

    .upload-btn:hover { background: var(--accent-hover); }

    .body-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .body-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .body-stat-card .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .body-stat-card .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .body-stat-card .stat-delta {
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .delta-up   { color: var(--red); }
    .delta-down { color: var(--green); }
    .delta-flat { color: var(--text-muted); }

    /* SVG line chart */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px 12px;
    }

    .chart-card h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    .chart-wrap { position: relative; }

    .chart-wrap svg { display: block; width: 100%; overflow: visible; }

    .chart-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .chart-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      transition: all 0.15s;
    }

    .chart-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .body-history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .body-history-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .body-history-card th {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 9px 10px;
      text-align: right;
      text-transform: uppercase;
    }

    .body-history-card th:first-child { text-align: left; }

    .body-history-card td {
      border-top: 1px solid var(--border);
      padding: 9px 10px;
      text-align: right;
      color: var(--text-muted);
    }

    .body-history-card td:first-child { text-align: left; color: var(--text); }

    .body-history-card tr:hover td { background: var(--surface2); }

    .clear-body-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 14px;
      transition: all 0.15s;
    }

    .clear-body-btn:hover { border-color: var(--red); color: var(--red); }

    @media (max-width: 360px) {
      .macro-grid, .item-macros { grid-template-columns: repeat(2, 1fr); }
      .meal-desc { max-width: 100px; }
      .body-stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Calorie Tracker</h1>
    <p>Describe your meal in plain English</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="log">Log Meal</button>
    <button class="tab-btn" data-tab="today">Today</button>
    <button class="tab-btn" data-tab="week">This Week</button>
    <button class="tab-btn" data-tab="body">Body</button>
  </nav>

  <!-- LOG MEAL TAB -->
  <div class="panel" id="tab-log">
    <div class="card">
      <form id="mealForm">
        <textarea
          id="mealInput"
          placeholder="e.g. 2 eggs, a cup of oatmeal with a handful of blueberries, and a glass of orange juice"
          rows="4"
        ></textarea>
        <div class="examples">
          Try:
          <span>2 scrambled eggs and toast</span>
          <span>chicken breast with rice and broccoli</span>
          <span>a bowl of pasta with marinara</span>
        </div>
        <button type="submit" id="submitBtn">Analyze Meal</button>
      </form>
      <div id="status"></div>
    </div>
    <div id="results"></div>
  </div>

  <!-- TODAY TAB -->
  <div class="panel hidden" id="tab-today">
    <div id="today-totals"></div>
    <div>
      <div class="section-header" style="margin-bottom:10px">
        <span class="section-title">Today's Meals</span>
      </div>
      <div class="history-card" id="today-table"></div>
    </div>
  </div>

  <!-- BODY TAB -->
  <div class="panel hidden" id="tab-body">
    <!-- Upload card -->
    <div class="card" id="body-upload-card">
      <label class="upload-area" id="uploadArea">
        <input type="file" id="csvInput" accept=".csv">
        <div class="upload-icon">📊</div>
        <strong>Upload RENPHO CSV export</strong>
        <p>Drag &amp; drop or click to browse</p>
        <p style="margin-top:4px;font-size:0.75rem">Weight, body fat, muscle mass, BMI and more</p>
        <button class="upload-btn" type="button" onclick="document.getElementById('csvInput').click();event.stopPropagation()">Choose File</button>
      </label>
    </div>
    <!-- Latest stats summary -->
    <div id="body-stats"></div>
    <!-- Chart -->
    <div class="chart-card" id="body-chart-card" style="display:none">
      <h3>Trend</h3>
      <div class="chart-selector" id="chartPills"></div>
      <div class="chart-wrap" id="chartWrap"></div>
    </div>
    <!-- History table -->
    <div id="body-history-wrap" style="display:none">
      <div class="section-header" style="margin-bottom:10px">
        <span class="section-title">Measurement History</span>
        <button class="clear-body-btn" id="clearBodyBtn">Clear all</button>
      </div>
      <div class="body-history-card" id="body-history-table"></div>
    </div>
  </div>

  <!-- WEEK TAB -->
  <div class="panel hidden" id="tab-week">
    <div class="week-chart" id="week-chart"></div>
    <div>
      <div class="section-header" style="margin-bottom:10px">
        <span class="section-title">Meal History</span>
      </div>
      <div class="history-card" id="week-table"></div>
    </div>
  </div>

  <script>
    // ── Storage ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'calorie_tracker_meals';

    function loadMeals() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveMeals(meals) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(meals));
    }

    function deleteMeal(id) {
      saveMeals(loadMeals().filter(m => m.id !== id));
      refreshAllViews();
    }

    // ── Date helpers ─────────────────────────────────────────────────────────
    function dateKey(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function todayKey() { return dateKey(Date.now()); }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(key) {
      const [y, m, d] = key.split('-').map(Number);
      return new Date(y, m-1, d).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
        if (btn.dataset.tab === 'today') renderToday();
        if (btn.dataset.tab === 'week')  renderWeek();
        if (btn.dataset.tab === 'body')  renderBody();
      });
    });

    // ── Example chips ────────────────────────────────────────────────────────
    document.querySelectorAll('.examples span').forEach(chip => {
      chip.addEventListener('click', () => { mealInput.value = chip.textContent; mealInput.focus(); });
    });

    // ── Form submit ──────────────────────────────────────────────────────────
    const form     = document.getElementById('mealForm');
    const mealInput = document.getElementById('mealInput');
    const btn      = document.getElementById('submitBtn');
    const status   = document.getElementById('status');
    const results  = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const description = mealInput.value.trim();
      if (!description) return;

      btn.disabled = true;
      status.className = '';
      status.innerHTML = '<span class="spinner"></span>Parsing meal with AI...';
      results.innerHTML = '';

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        // Save to localStorage
        const meal = {
          id: crypto.randomUUID(),
          ts: Date.now(),
          description,
          items: data.items,
          totals: data.totals,
        };
        const meals = loadMeals();
        meals.push(meal);
        saveMeals(meals);

        status.innerHTML = '';
        renderAnalyzeResult(data);
      } catch (err) {
        status.className = 'error';
        status.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });

    // ── Analyze result (Log tab) ─────────────────────────────────────────────
    function renderAnalyzeResult({ items, totals }) {
      results.innerHTML = `
        ${macroTotalsHTML(totals, 'Meal Nutrition')}
        <div class="items-list">${items.map(itemCardHTML).join('')}</div>
      `;
    }

    // ── Today tab ────────────────────────────────────────────────────────────
    function renderToday() {
      const meals = loadMeals().filter(m => dateKey(m.ts) === todayKey());
      const totals = sumTotals(meals);
      const GOAL = 2000;

      const pct = Math.min(100, Math.round((totals.calories / GOAL) * 100));

      document.getElementById('today-totals').innerHTML = `
        ${macroTotalsHTML(totals, 'Today\'s Running Total')}
        <div class="day-total-bar"><div class="day-total-bar-fill" style="width:${pct}%"></div></div>
        <div class="day-goal-label">${totals.calories} / ${GOAL} kcal goal (${pct}%)</div>
      `;

      document.getElementById('today-table').innerHTML = mealsTableHTML(meals);
    }

    // ── Week tab ─────────────────────────────────────────────────────────────
    function renderWeek() {
      const allMeals = loadMeals();
      const today = new Date();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const key = dateKey(d.getTime());
        const dayMeals = allMeals.filter(m => dateKey(m.ts) === key);
        const totals = sumTotals(dayMeals);
        days.push({ key, d, totals, isToday: i === 0 });
      }

      const maxCal = Math.max(100, ...days.map(d => d.totals.calories));
      const weekTotals = sumTotals(allMeals.filter(m => {
        const d = new Date(); d.setDate(d.getDate() - 6);
        return m.ts >= d.getTime();
      }));

      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      const barsHTML = days.map(({ d, totals, isToday }) => {
        const heightPct = totals.calories > 0 ? Math.max(4, (totals.calories / maxCal) * 100) : 0;
        const cls = isToday ? 'today' : totals.calories > 0 ? 'past' : 'empty';
        return `
          <div class="bar-col">
            <div class="bar-val">${totals.calories > 0 ? totals.calories : ''}</div>
            <div class="bar ${cls}" style="height:${heightPct}%"></div>
            <div class="bar-day ${isToday ? 'today' : ''}">${dayLabels[d.getDay()]}</div>
          </div>`;
      }).join('');

      document.getElementById('week-chart').innerHTML = `
        <h2>7-Day Overview</h2>
        <div class="bar-chart">${barsHTML}</div>
        <div class="week-macros">
          <div class="week-macro"><div class="wv" style="color:var(--orange)">${weekTotals.calories}</div><div class="wl">kcal</div></div>
          <div class="week-macro"><div class="wv" style="color:var(--green)">${weekTotals.protein}g</div><div class="wl">protein</div></div>
          <div class="week-macro"><div class="wv" style="color:var(--blue)">${weekTotals.carbs}g</div><div class="wl">carbs</div></div>
          <div class="week-macro"><div class="wv" style="color:var(--red)">${weekTotals.fat}g</div><div class="wl">fat</div></div>
        </div>
      `;

      // Full meal history table (all 7 days, newest first)
      const weekMeals = allMeals.filter(m => {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 6); cutoff.setHours(0,0,0,0);
        return m.ts >= cutoff.getTime();
      }).slice().reverse();

      document.getElementById('week-table').innerHTML = mealsTableHTML(weekMeals, true);
    }

    // ── Shared helpers ───────────────────────────────────────────────────────
    function sumTotals(meals) {
      return meals.reduce((acc, m) => ({
        calories: acc.calories + m.totals.calories,
        protein:  Math.round((acc.protein  + m.totals.protein)  * 10) / 10,
        carbs:    Math.round((acc.carbs    + m.totals.carbs)    * 10) / 10,
        fat:      Math.round((acc.fat      + m.totals.fat)      * 10) / 10,
      }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
    }

    function macroTotalsHTML(totals, label) {
      return `
        <div class="totals-card">
          <h2>${escHtml(label)}</h2>
          <div class="macro-grid">
            <div class="macro-cell cal"><div class="val">${totals.calories}</div><div class="lbl">Calories</div></div>
            <div class="macro-cell pro"><div class="val">${totals.protein}g</div><div class="lbl">Protein</div></div>
            <div class="macro-cell car"><div class="val">${totals.carbs}g</div><div class="lbl">Carbs</div></div>
            <div class="macro-cell fat"><div class="val">${totals.fat}g</div><div class="lbl">Fat</div></div>
          </div>
        </div>`;
    }

    function mealsTableHTML(meals, showDate = false) {
      if (meals.length === 0) {
        return '<div class="empty-state">No meals logged yet</div>';
      }
      const rows = meals.map(m => `
        <tr>
          <td>
            <div class="meal-desc" title="${escHtml(m.description)}">${escHtml(m.description)}</div>
            <div class="meal-time">${showDate ? formatDate(dateKey(m.ts)) + ' · ' : ''}${formatTime(m.ts)}</div>
          </td>
          <td style="color:var(--orange)">${m.totals.calories}</td>
          <td style="color:var(--green)">${m.totals.protein}g</td>
          <td style="color:var(--blue)">${m.totals.carbs}g</td>
          <td style="color:var(--red)">${m.totals.fat}g</td>
          <td><button class="delete-btn" data-id="${escHtml(m.id)}">Delete</button></td>
        </tr>`).join('');

      return `
        <table>
          <thead>
            <tr>
              <th>Meal</th>
              <th>kcal</th>
              <th>Pro</th>
              <th>Carbs</th>
              <th>Fat</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function itemCardHTML(item) {
      if (!item.found) {
        return `
          <div class="item-card not-found">
            <div class="item-header">
              <div class="item-name">${escHtml(item.food_name)}</div>
              <div class="item-grams">${item.grams}g</div>
            </div>
            <div class="not-found-msg">Could not find nutritional data</div>
          </div>`;
      }
      return `
        <div class="item-card">
          <div class="item-header">
            <div class="item-name">${escHtml(item.food_name)}</div>
            <div class="item-grams">${item.grams}g</div>
          </div>
          ${item.matched_name ? `<div class="matched-name">Matched: ${escHtml(item.matched_name)}</div>` : ''}
          <div class="item-macros">
            <div class="item-macro"><div class="v" style="color:var(--orange)">${item.calories}</div><div class="l">kcal</div></div>
            <div class="item-macro"><div class="v" style="color:var(--green)">${item.protein}g</div><div class="l">protein</div></div>
            <div class="item-macro"><div class="v" style="color:var(--blue)">${item.carbs}g</div><div class="l">carbs</div></div>
            <div class="item-macro"><div class="v" style="color:var(--red)">${item.fat}g</div><div class="l">fat</div></div>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Delete button delegation ─────────────────────────────────────────────
    document.addEventListener('click', e => {
      const btn = e.target.closest('.delete-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      if (!id) return;
      deleteMeal(id);
    });

    function refreshAllViews() {
      const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
      if (activeTab === 'today') renderToday();
      if (activeTab === 'week')  renderWeek();
      if (activeTab === 'body')  renderBody();
    }

    // ── Body data storage ────────────────────────────────────────────────────
    const BODY_KEY = 'calorie_tracker_body';

    function loadBodyData() {
      try { return JSON.parse(localStorage.getItem(BODY_KEY)) || []; }
      catch { return []; }
    }

    function saveBodyData(rows) {
      localStorage.setItem(BODY_KEY, JSON.stringify(rows));
    }

    // RENPHO CSV column mappings. Keys are the display label used in the UI;
    // values are arrays of possible CSV header names (RENPHO header text varies
    // by app version and locale).
    const RENPHO_FIELDS = [
      { key: 'weight',       label: 'Weight (kg)',         cols: ['Weight(kg)', 'Weight (kg)', 'weight_kg', 'Weight'] },
      { key: 'bmi',          label: 'BMI',                 cols: ['BMI', 'bmi'] },
      { key: 'bodyFat',      label: 'Body Fat %',          cols: ['Body Fat(%)', 'Body Fat (%)', 'body_fat_percentage', 'Body Fat'] },
      { key: 'fatFreeWeight',label: 'Fat-Free Weight (kg)',cols: ['Fat-free Body Weight(kg)', 'Fat-free Body Weight (kg)', 'fat_free_body_weight_kg'] },
      { key: 'subcutFat',    label: 'Subcutaneous Fat %',  cols: ['Subcutaneous Fat(%)', 'Subcutaneous Fat (%)', 'subcutaneous_fat'] },
      { key: 'visceralFat',  label: 'Visceral Fat',        cols: ['Visceral Fat', 'visceral_fat'] },
      { key: 'bodyWater',    label: 'Body Water %',        cols: ['Body Water(%)', 'Body Water (%)', 'body_water'] },
      { key: 'skeletalMuscle',label:'Skeletal Muscle %',   cols: ['Skeletal Muscle(%)', 'Skeletal Muscle (%)', 'skeletal_muscle'] },
      { key: 'muscleMass',   label: 'Muscle Mass (kg)',    cols: ['Muscle Mass(kg)', 'Muscle Mass (kg)', 'muscle_mass_kg', 'Muscle Mass'] },
      { key: 'boneMass',     label: 'Bone Mass (kg)',      cols: ['Bone Mass(kg)', 'Bone Mass (kg)', 'bone_mass_kg', 'Bone Mass'] },
      { key: 'protein',      label: 'Protein %',           cols: ['Protein(%)', 'Protein (%)', 'protein'] },
      { key: 'bmr',          label: 'BMR (kcal)',          cols: ['BMR(kcal)', 'BMR (kcal)', 'bmr_kcal', 'BMR'] },
      { key: 'metabolicAge', label: 'Metabolic Age',       cols: ['Metabolic Age', 'metabolic_age'] },
    ];

    function parseRenphoCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) throw new Error('CSV has no data rows');

      // Parse header row — handle quoted fields
      const parseRow = line => {
        const out = []; let cur = ''; let inQ = false;
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        out.push(cur.trim());
        return out;
      };

      const headers = parseRow(lines[0]);

      // Map our known fields to column indices
      const colMap = {};
      for (const field of RENPHO_FIELDS) {
        for (const col of field.cols) {
          const idx = headers.findIndex(h => h.trim().replace(/"/g,'') === col);
          if (idx !== -1) { colMap[field.key] = idx; break; }
        }
      }

      // Find date/time column
      const dateIdx = headers.findIndex(h => /time of measurement|date|timestamp/i.test(h));

      if (dateIdx === -1 && Object.keys(colMap).length === 0)
        throw new Error('Does not look like a RENPHO export — no recognised columns found');

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cells = parseRow(lines[i]);
        const dateStr = dateIdx !== -1 ? cells[dateIdx]?.replace(/"/g,'').trim() : null;
        const ts = dateStr ? Date.parse(dateStr) : null;
        if (!ts || isNaN(ts)) continue;

        const entry = { ts };
        for (const [key, idx] of Object.entries(colMap)) {
          const v = parseFloat(cells[idx]);
          if (!isNaN(v)) entry[key] = v;
        }
        if (Object.keys(entry).length > 1) rows.push(entry);
      }

      if (rows.length === 0) throw new Error('No valid measurement rows found in CSV');
      return rows.sort((a, b) => a.ts - b.ts);
    }

    function mergeBodyData(existing, incoming) {
      // Merge by timestamp — incoming overwrites existing for same ts
      const map = new Map(existing.map(r => [r.ts, r]));
      for (const r of incoming) map.set(r.ts, { ...map.get(r.ts), ...r });
      return [...map.values()].sort((a, b) => a.ts - b.ts);
    }

    // ── CSV upload handling ──────────────────────────────────────────────────
    const csvInput   = document.getElementById('csvInput');
    const uploadArea = document.getElementById('uploadArea');

    function handleCSVFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const incoming = parseRenphoCSV(e.target.result);
          const merged   = mergeBodyData(loadBodyData(), incoming);
          saveBodyData(merged);
          renderBody();
        } catch (err) {
          alert('Could not parse CSV: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    csvInput.addEventListener('change', e => handleCSVFile(e.target.files[0]));

    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      handleCSVFile(e.dataTransfer.files[0]);
    });
    uploadArea.addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') csvInput.click();
    });

    document.getElementById('clearBodyBtn').addEventListener('click', () => {
      if (confirm('Delete all body measurement data?')) {
        saveBodyData([]);
        renderBody();
      }
    });

    // ── Body tab renderer ────────────────────────────────────────────────────
    let activeBodyField = 'weight';

    function renderBody() {
      const rows = loadBodyData();
      const hasData = rows.length > 0;

      document.getElementById('body-chart-card').style.display   = hasData ? '' : 'none';
      document.getElementById('body-history-wrap').style.display = hasData ? '' : 'none';

      if (!hasData) {
        document.getElementById('body-stats').innerHTML = '';
        return;
      }

      // Latest and previous readings
      const latest = rows[rows.length - 1];
      const prev   = rows.length > 1 ? rows[rows.length - 2] : null;

      // Determine which fields we actually have data for
      const availableFields = RENPHO_FIELDS.filter(f => latest[f.key] != null);

      // Stats summary grid (show up to 8 most informative fields)
      const PRIORITY = ['weight','bodyFat','muscleMass','bmi','visceralFat','bmr','bodyWater','metabolicAge'];
      const statFields = PRIORITY.map(k => availableFields.find(f => f.key === k)).filter(Boolean).slice(0, 8);

      document.getElementById('body-stats').innerHTML = statFields.length ? `
        <div class="body-stats-grid">
          ${statFields.map(f => {
            const cur = latest[f.key];
            const old = prev?.[f.key];
            let deltaHTML = '';
            if (old != null) {
              const diff = +(cur - old).toFixed(2);
              const sign = diff > 0 ? '+' : '';
              // For body fat and visceral fat, up is bad; for most others same
              const badUp = ['bodyFat','visceralFat','subcutFat','bmi','metabolicAge'].includes(f.key);
              const cls = diff === 0 ? 'delta-flat' : (diff > 0 === badUp ? 'delta-up' : 'delta-down');
              deltaHTML = `<div class="stat-delta ${cls}">${sign}${diff} vs prev</div>`;
            }
            return `
              <div class="body-stat-card">
                <div class="stat-label">${escHtml(f.label)}</div>
                <div class="stat-val">${cur}</div>
                ${deltaHTML}
              </div>`;
          }).join('')}
        </div>` : '';

      // Chart pills — only fields with ≥2 data points
      const chartFields = availableFields.filter(f => rows.filter(r => r[f.key] != null).length >= 2);
      if (!chartFields.find(f => f.key === activeBodyField)) {
        activeBodyField = chartFields[0]?.key || 'weight';
      }

      document.getElementById('chartPills').innerHTML = chartFields.map(f => `
        <button class="chart-pill ${f.key === activeBodyField ? 'active' : ''}" data-field="${escHtml(f.key)}">${escHtml(f.label)}</button>
      `).join('');

      renderBodyChart(rows, activeBodyField);
      renderBodyTable(rows, availableFields);
    }

    function renderBodyChart(rows, fieldKey) {
      const field = RENPHO_FIELDS.find(f => f.key === fieldKey);
      const points = rows.map(r => ({ ts: r.ts, v: r[fieldKey] })).filter(p => p.v != null);
      if (points.length < 2) { document.getElementById('chartWrap').innerHTML = ''; return; }

      const W = 580, H = 160, PL = 44, PR = 12, PT = 10, PB = 28;
      const iW = W - PL - PR, iH = H - PT - PB;

      const minV = Math.min(...points.map(p => p.v));
      const maxV = Math.max(...points.map(p => p.v));
      const rangeV = maxV - minV || 1;
      const minT = points[0].ts, maxT = points[points.length-1].ts;
      const rangeT = maxT - minT || 1;

      const px = t => PL + ((t - minT) / rangeT) * iW;
      const py = v => PT + iH - ((v - minV) / rangeV) * iH;

      const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${px(p.ts).toFixed(1)},${py(p.v).toFixed(1)}`).join(' ');
      // Closed fill path
      const fillD = pathD + ` L${px(points[points.length-1].ts).toFixed(1)},${(PT+iH).toFixed(1)} L${px(points[0].ts).toFixed(1)},${(PT+iH).toFixed(1)} Z`;

      // Y-axis labels (3 ticks)
      const yTicks = [minV, (minV+maxV)/2, maxV].map(v => ({
        v: +v.toFixed(1),
        y: py(v),
      }));

      // X-axis labels (up to 5 evenly spaced)
      const maxXLabels = Math.min(5, points.length);
      const step = Math.floor((points.length - 1) / (maxXLabels - 1)) || 1;
      const xTicks = [];
      for (let i = 0; i < points.length; i += step) xTicks.push(points[i]);
      if (xTicks[xTicks.length-1] !== points[points.length-1]) xTicks.push(points[points.length-1]);

      const fmtDate = ts => {
        const d = new Date(ts);
        return `${d.getMonth()+1}/${d.getDate()}`;
      };

      document.getElementById('chartWrap').innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6c8ef5" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#6c8ef5" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- fill -->
          <path d="${fillD}" fill="url(#bodyGrad)"/>
          <!-- line -->
          <path d="${pathD}" fill="none" stroke="#6c8ef5" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <!-- dots -->
          ${points.map(p => `<circle cx="${px(p.ts).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="3" fill="#6c8ef5"/>`).join('')}
          <!-- y-axis labels -->
          ${yTicks.map(t => `<text x="${PL-6}" y="${t.y+4}" text-anchor="end" font-size="10" fill="#7986cb">${t.v}</text>`).join('')}
          <!-- x-axis labels -->
          ${xTicks.map(p => `<text x="${px(p.ts).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="#7986cb">${fmtDate(p.ts)}</text>`).join('')}
        </svg>`;
    }

    function renderBodyTable(rows, availableFields) {
      const showFields = availableFields.slice(0, 6); // cap columns for readability
      const reversed = rows.slice().reverse();

      const headers = `<tr><th>Date</th>${showFields.map(f => `<th>${escHtml(f.label)}</th>`).join('')}</tr>`;
      const body = reversed.map(r => {
        const d = new Date(r.ts);
        const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric', year: '2-digit' });
        const cells = showFields.map(f => `<td>${r[f.key] != null ? r[f.key] : '—'}</td>`).join('');
        return `<tr><td>${escHtml(dateStr)}</td>${cells}</tr>`;
      }).join('');

      document.getElementById('body-history-table').innerHTML = `
        <table><thead>${headers}</thead><tbody>${body}</tbody></table>`;
    }

    // Chart pill clicks
    document.getElementById('chartPills').addEventListener('click', e => {
      const pill = e.target.closest('.chart-pill');
      if (!pill) return;
      activeBodyField = pill.dataset.field;
      document.querySelectorAll('.chart-pill').forEach(p => p.classList.toggle('active', p.dataset.field === activeBodyField));
      renderBodyChart(loadBodyData(), activeBodyField);
    });
  </script>
</body>
</html>
